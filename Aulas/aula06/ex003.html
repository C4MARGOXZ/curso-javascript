    <script>
       // parte de javascript
        var n1 = Number(window.prompt("Digite o primeiro número: "))
        var n2 = Number(window.prompt("Digite o segundo número: ")) //ja converte a variavel recebida pra numeros

        window.alert(`A soma entre ${n1} e ${n2} é igual a ${soma}`) // interpolar tudo em uma crase so semnecessidadede varias aspas
    </script>
