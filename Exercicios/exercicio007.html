<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício DOM</title>

    <style>
        body {
            background-color: rgb(85, 129, 129);
            color: white;
            font: normal 18pt Arial;
        }
    </style>
</head>

<body>

    <h1>Primeiro exercício utilizando DOM</h1>
    <p>Vamos ver no que vai dar</p>

    <div id="msg"></div>

    <script>

        let nome = prompt('Digite seu nome')
        let idade = parseInt(prompt('Digite sua idade'))

        alert(`Seu nome é ${nome} e você tem ${idade} anos!`)

        let maioridade = idade >= 18
        ? 'você é maior de idade'
        : 'você é menor de idade'

        let d = document.querySelector('#msg')

        d.innerText = `Olá ${nome}, ${maioridade}`

        if (idade >= 18) {
            document.body.style.background = 'green'
        } else {
            document.body.style.background = 'red'
        }

    </script>

</body>
</html>
