<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>advinhe o numero </title>
</head>
<body>
    <script>
       let  numerosecreto = Math.floor(Math.random()* 10) + 1
       let chute = parseInt(prompt('Tente advinhar o numero secreto entre 1 e 10: '))

       if (chute == numerosecreto) {
        alert('Parabéns, você acertou')
       }
       else {
        alert(`Voce errou, o numero era: ${numerosecreto}`)

       }









       
    </script>
</body>
</html>
