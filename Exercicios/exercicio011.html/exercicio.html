<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Categoria - Nadador</title>
    <link rel="stylesheet" href="nadador.css">
</head>
<body>
    <header>
        <h1>Verificador de Categoria</h1>
    </header>

    <section>
        <div class="formulario">
            <p>
                <label for="txtnome">Nome do nadador:</label>
                <input type="text" id="txtnome" placeholder="Digite o nome">
            </p>

            <p>
                <label for="txtano">Ano de Nascimento:</label>
                <input type="number" id="txtano" placeholder="Ex: 2015">
            </p>

            <p>Sexo:</p>
            <div class="grupo-sexo">
                <input type="radio" name="radsex" id="masc" checked>
                <label for="masc">Masculino</label>

                <input type="radio" name="radsex" id="fem">
                <label for="fem">Feminino</label>
            </div>

            <button onclick="verificar()">Verificar</button>
        </div>

        <div id="res">
            Preencha os dados acima para verificar a categoria
        </div>
    </section>

    <script src="nadador.js"></script>
</body>
</html>
