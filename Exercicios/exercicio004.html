<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Temperatura</title>
<style>
    body {
        color:  white;
        background-color: rgb(236, 122, 122);
        font: normal 20pt Arial;
    }
</style>



</head>
<body>
    <script>
        let temperatura = parseFloat(prompt('Digite a temperatura em graus celsius: ')); 

        if (temperatura <15) {
            alert('Esta frio!')
        }

        else if (temperatura >=15 && temperatura <= 25){
           alert("A temperatura esta agradavel")}

        else if (temperatura>25) {
            alert('Esta quente!')
        }
            
            






    </script>
</body>
</html>
